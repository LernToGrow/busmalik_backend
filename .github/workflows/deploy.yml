name: Deploy BusMalik Backend to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            export PATH=/home/sumit/.nvm/versions/node/v20.20.2/bin:$PATH
            cd /home/sumit/apps/busmalik/backend/busmalik_backend
            git pull origin main
            npm install
            npm run build
            pm2 reload busmalik-api --update-env